<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 МАРТА, МАМА! 💐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            font-family: 'Segoe UI', 'Montserrat', sans-serif;
            background: linear-gradient(145deg, #0b0719 0%, #1f1a3a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* ОСНОВНОЙ КРУГЛЫЙ КУРСОР - РОЗОВЫЙ */
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffb6c1, #ff69b4, #ff1493);
            box-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493, 0 0 90px #ffb6c1;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            animation: cursorGlow 3s infinite alternate;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.6);
        }

        @keyframes cursorGlow {
            0% { opacity: 0.9; filter: blur(1px); width: 40px; height: 40px; }
            100% { opacity: 1; filter: blur(2px); width: 55px; height: 55px; }
        }

        /* МАЛЕНЬКИЙ ХВОСТИК КУРСОРА - ТОЖЕ РОЗОВЫЙ */
        .cursor-tail {
            position: fixed;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffb6c1, #ff69b4);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #ff69b4;
            transition: 0.05s linear;
            opacity: 0.8;
        }

        /* ПАРАЛЛАКС ФОН (ДВИЖЕТСЯ ЗА МЫШЬЮ) */
        .parallax-bg {
            position: fixed;
            top: -50px;
            left: -50px;
            right: -50px;
            bottom: -50px;
            background: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 10 Q40 5 45 15 Q50 25 40 30 Q50 35 45 45 Q40 55 30 50 Q20 55 15 45 Q10 35 20 30 Q10 25 15 15 Q20 5 30 10" fill="%23ffb6c1" opacity="0.2"/><circle cx="30" cy="30" r="5" fill="%23ffd700" opacity="0.3"/></svg>') repeat;
            background-size: 120px 120px;
            z-index: -2;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }

        /* ВТОРОЙ СЛОЙ ПАРАЛЛАКСА (БЛИКИ) */
        .parallax-shine {
            position: fixed;
            top: -100px;
            left: -100px;
            right: -100px;
            bottom: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(255,182,193,0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255,215,0,0.1) 0%, transparent 45%),
                        radial-gradient(circle at 20% 80%, rgba(173,216,230,0.1) 0%, transparent 50%);
            z-index: -1;
            transition: transform 0.15s ease-out;
            pointer-events: none;
        }

        /* ОСНОВНОЙ КОНТЕНТ (ПРИ ПАРАЛЛАКСЕ ТОЖЕ ДВИГАЕТСЯ) */
        .content {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }

        .content * {
            pointer-events: auto;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,105,180,0.5), 0 0 70px rgba(255,20,147,0.3);
            margin-bottom: 0.5rem;
            animation: titleFloat 3s infinite ease-in-out;
            filter: drop-shadow(0 0 20px #ff1493);
            letter-spacing: 2px;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .greeting {
            font-size: 2rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 3rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 2rem 0 3rem;
            color: #ffe6f0;
            font-weight: 300;
            transform: scale(1);
            transition: transform 0.3s;
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 20px 40px rgba(255,105,180,0.3); }
            50% { box-shadow: 0 30px 60px rgba(255,105,180,0.7); }
        }

        /* КАРТОЧКИ - ТЕПЕРЬ ТОЛЬКО ОДНА */
        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            margin: 3rem 0;
            perspective: 1200px;
        }

        .card {
            background: rgba(30, 20, 50, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            width: 350px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            animation: cardRise 1s backwards;
        }

        @keyframes cardRise {
            0% { opacity: 0; transform: translateY(70px) rotateX(-15deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .card:hover {
            transform: translateY(-25px) rotateY(5deg) rotateX(5deg) scale(1.02);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 50px 90px rgba(255,105,180,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.3), transparent 70%);
            opacity: 0;
            transition: opacity 0.7s;
            transform: rotate(20deg);
        }

        .card:hover::before {
            opacity: 0.4;
        }

        .card h3 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffd700, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px #ff69b4);
        }

        .card p {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #f0eaff;
        }

        .card-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px #ff69b4);
            animation: iconShake 3s infinite;
        }

        @keyframes iconShake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.1); }
        }

        /* КНОПКА С СЮРПРИЗОМ */
        .surprise-button {
            background: linear-gradient(135deg, #ff1493, #ffd700, #ff1493);
            background-size: 200% 200%;
            border: none;
            color: white;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 1.3rem 4rem;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 0 40px #ff69b4, 0 0 90px #ff1493;
            transition: all 0.4s;
            margin: 2rem 0 1rem;
            border: 2px solid rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: gradientMove 4s infinite alternate;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .surprise-button:hover {
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 0 80px #ff69b4, 0 0 150px gold;
            border-color: white;
        }

        .surprise-button::after {
            content: '✨';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(25deg);
            animation: shine 5s infinite;
        }

        @keyframes shine {
            0% { left: -50%; }
            30% { left: 100%; }
            100% { left: 100%; }
        }

        /* ПОПАП С СЮРПРИЗОМ */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(20, 10, 30, 0.9);
            backdrop-filter: blur(25px);
            border: 3px solid rgba(255,215,0,0.7);
            border-radius: 70px;
            padding: 3.5rem;
            z-index: 1000;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 150px gold, 0 0 300px #ff1493;
            max-width: 600px;
            width: 90%;
            pointer-events: none;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .popup h2 {
            font-size: 3.5rem;
            color: gold;
            text-shadow: 0 0 30px orange;
            margin-bottom: 1.5rem;
        }

        .popup p {
            font-size: 2rem;
            color: #fff0f5;
            margin-bottom: 2rem;
        }

        .popup .close-popup {
            background: linear-gradient(45deg, #ff1493, #ff4500);
            border: none;
            color: white;
            font-size: 1.8rem;
            padding: 1rem 3rem;
            border-radius: 50px;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.3s;
        }

        .popup .close-popup:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px #ff1493;
        }

        /* КОНФЕТТИ - ТЕПЕРЬ ЭТО ТЮЛЬПАНЫ И СЕРДЕЧКИ */
        .emoji-rain {
            position: fixed;
            top: -20px;
            font-size: 2.5rem;
            z-index: 999;
            animation: emojiFall 5s linear forwards;
            filter: drop-shadow(0 0 10px rgba(255,105,180,0.8));
            pointer-events: none;
            user-select: none;
        }

        @keyframes emojiFall {
            to { 
                transform: translateY(120vh) rotate(360deg); 
            }
        }

        /* АДАПТАЦИЯ */
        @media (max-width: 700px) {
            h1 { font-size: 3.2rem; }
            .greeting { font-size: 1.5rem; padding: 0.8rem 1.5rem; }
            .card { width: 280px; }
            .emoji-rain { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- КАСТОМНЫЙ КУРСОР РОЗОВЫЙ -->
    <div class="custom-cursor" id="cursor"></div>

    <!-- ПАРАЛЛАКС ФОНЫ -->
    <div class="parallax-bg" id="parallaxBg"></div>
    <div class="parallax-shine" id="parallaxShine"></div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="content" id="content">
        <h1>🌷 С 8 марта, мама! 🌷</h1>
        <p class="greeting">Здравствуйте, наши любимые!</p>

        <div class="cards">
            <div class="card">
                <div class="card-icon">💗</div>
                <h3>Маме</h3>
                <p>Спасибо за всё, я тебя очень люблю 💗💗💗</p>
            </div>
        </div>

        <button class="surprise-button" id="surpriseBtn">ОТКРЫТЬ 🎁</button>
    </div>

    <!-- ПОПАП СЮРПРИЗА -->
    <div class="popup" id="popup">
        <h2>🎉 СЮРПРИЗ! 🎉</h2>
        <p>Мамочка, ты самая лучшая!</p>
        <p>🌷💗 тебе в подарок! 💗🌷</p>
        <button class="close-popup" id="closePopup">Закрыть</button>
    </div>

    <script>
        (function() {
            // === КАСТОМНЫЙ РОЗОВЫЙ КУРСОР С ХВОСТИКОМ ===
            const cursor = document.getElementById('cursor');

            document.addEventListener('mousemove', (e) => {
                // Основной курсор
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';

                // Создаём розовый хвостик
                const tail = document.createElement('div');
                tail.className = 'cursor-tail';
                tail.style.left = e.clientX + 'px';
                tail.style.top = e.clientY + 'px';
                // Розовые оттенки для хвостика
                const pinkHue = 320 + Math.random() * 40; // от 320 до 360 (розово-красные тона)
                tail.style.background = `radial-gradient(circle, #ffb6c1, hsl(${pinkHue}, 80%, 70%))`;
                document.body.appendChild(tail);
                
                // Удаляем хвостик через 0.4 сек
                setTimeout(() => {
                    if (tail.parentNode) tail.remove();
                }, 400);
            });

            // Скрыть курсор при выходе за пределы окна
            document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

            // === ПАРАЛЛАКС ЭФФЕКТ ===
            const bg = document.getElementById('parallaxBg');
            const shine = document.getElementById('parallaxShine');
            const mainContent = document.getElementById('content');

            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 2; // от -1 до 1
                const y = (e.clientY / window.innerHeight - 0.5) * 2;

                // Фон двигается медленнее
                if (bg) {
                    bg.style.transform = `translate(${x * -30}px, ${y * -30}px)`;
                }
                if (shine) {
                    shine.style.transform = `translate(${x * -20}px, ${y * -20}px)`;
                }
                // Основной контент чуть-чуть двигается для объёма
                if (mainContent) {
                    mainContent.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
                }
            });

            // === ЭФФЕКТ НАКЛОНА ДЛЯ КАРТОЧКИ (TILT) ===
            const card = document.querySelector('.card');
            if (card) {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    let deltaX = (x - centerX) / 15;
                    let deltaY = (y - centerY) / 15;

                    card.style.transform = `translateY(-15px) rotateY(${deltaX}deg) rotateX(${-deltaY}deg) scale(1.02)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                });
            }

            // === СЮРПРИЗ: КНОПКА, ПОПАП И ЭМОДЗИ ДОЖДЬ 🌷💗 ===
            const surpriseBtn = document.getElementById('surpriseBtn');
            const popup = document.getElementById('popup');
            const closePopup = document.getElementById('closePopup');

            function createEmojiRain() {
                const emojis = ['🌷', '💗', '🌷', '💗', '🌷', '💗', '🌸', '💖']; // Добавил еще для разнообразия
                for (let i = 0; i < 60; i++) {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-rain';
                    
                    // Выбираем случайный эмодзи (преимущественно 🌷 и 💗)
                    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.textContent = randomEmoji;
                    
                    // Случайное положение по горизонтали
                    emoji.style.left = Math.random() * 100 + '%';
                    
                    // Случайный размер
                    const size = 1.5 + Math.random() * 2;
                    emoji.style.fontSize = size + 'rem';
                    
                    // Случайная длительность анимации
                    const duration = 3 + Math.random() * 4;
                    emoji.style.animationDuration = duration + 's';
                    
                    // Случайная задержка
                    emoji.style.animationDelay = Math.random() * 2 + 's';
                    
                    // Добавляем на страницу
                    document.body.appendChild(emoji);

                    // Удаляем после окончания анимации
                    setTimeout(() => {
                        if (emoji.parentNode) emoji.remove();
                    }, duration * 1000 + 2000);
                }
            }

            surpriseBtn.addEventListener('click', () => {
                popup.classList.add('show');
                createEmojiRain(); // Запускаем дождь из 🌷 и 💗

                // Дополнительный сюрприз: изменение цвета фона
                document.body.style.transition = 'background 1.5s';
                document.body.style.background = 'linear-gradient(145deg, #ffc0cb, #dda0dd, #87cefa)';
                setTimeout(() => {
                    document.body.style.background = '';
                }, 1500);
            });

            closePopup.addEventListener('click', () => {
                popup.classList.remove('show');
            });

            // Закрытие попапа кликом вне окна
            popup.addEventListener('click', (e) => {
                if (e.target === popup) {
                    popup.classList.remove('show');
                }
            });

            // Небольшой дождь при загрузке страницы
            window.addEventListener('load', () => {
                setTimeout(() => {
                    createEmojiRain();
                }, 600);
            });

            // Дополнительный эффект для заголовка
            const mainTitle = document.querySelector('h1');
            setInterval(() => {
                mainTitle.style.textShadow = '0 0 40px #ff69b4, 0 0 90px gold';
                setTimeout(() => {
                    mainTitle.style.textShadow = '0 0 30px rgba(255,105,180,0.5), 0 0 70px rgba(255,20,147,0.3)';
                }, 300);
            }, 2000);
        })();
    </script>
</body>
</html>
